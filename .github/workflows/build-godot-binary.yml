name: Build Godot binary and push to GHCR

# Builds the V-Sekai custom Godot editor (double precision, headless) from
# v-sekai-multiplayer-fabric/godot @ feat/assets and pushes a minimal Docker
# image to GHCR. The baker's Dockerfile uses this image so CI never recompiles
# Godot from source.
#
# Run manually when the engine branch updates, or weekly via cron.
# Result: ghcr.io/v-sekai-multiplayer-fabric/godot-editor-double

on:
  workflow_dispatch:
  schedule:
    # Weekly on Mondays — picks up feat/assets updates automatically
    - cron: "0 2 * * 1"

permissions:
  contents: read
  packages: write

jobs:
  build-godot:
    runs-on: ubuntu-latest
    timeout-minutes: 240   # full engine build is ~1h on free runner

    steps:
      - name: Checkout baker repo
        uses: actions/checkout@v4

      - name: Checkout godot engine source (feat/assets branch)
        uses: actions/checkout@v4
        with:
          repository: v-sekai-multiplayer-fabric/godot
          ref: feat/assets
          path: godot-src
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get godot engine commit SHA
        id: godot-sha
        run: echo "sha=$(git -C godot-src rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build and push Godot binary image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/godot-binary/Dockerfile
          build-contexts: |
            godot-src=godot-src
          push: true
          tags: |
            ghcr.io/v-sekai-multiplayer-fabric/godot-editor-double:latest
            ghcr.io/v-sekai-multiplayer-fabric/godot-editor-double:${{ steps.godot-sha.outputs.sha }}
          cache-from: type=gha,scope=godot-editor-double
          cache-to: type=gha,mode=max,scope=godot-editor-double
